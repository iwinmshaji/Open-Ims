<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>OpenIMS PDF Chatbot</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <div class="app">

    <aside class="sidebar">
      <div class="brand">
        <img src="./icon.png" class="logo" alt="OpenIMS icon" />
        <div>
          <h1>OpenIMS</h1>
          <p>PDF Chatbot</p>
        </div>
      </div>

      <div class="side-menu">
        <p class="menu-title">Features</p>

        <label class="menu-item" for="pdfInput">📄 Upload PDF</label>
        <input type="file" id="pdfInput" accept="application/pdf" multiple hidden />

        <button id="storeBtn" class="menu-item btn-reset">💾 Store Document</button>
        <button class="menu-item btn-reset" onclick="document.getElementById('messageInput').focus()">💬 Chat</button>
      </div>

      <div class="uploaded-section">
        <h3>Uploaded Documents</h3>
        <p class="hint">Upload PDFs and ask questions from them.</p>
        <div id="docList" class="doc-list"></div>
      </div>
    </aside>

    <main class="chat-area">

      <section id="chatBox" class="chat-box">

        <div class="welcome-screen" id="welcomeScreen">
          <div class="orb"></div>

          <h1>Ready to Chat with Your PDFs?</h1>
          <p>Upload your documents and ask OpenIMS anything from them.</p>

          <div class="quick-actions">
            <label for="pdfInput" class="quick-btn">📄 Upload PDF</label>
            <button class="quick-btn" onclick="document.getElementById('messageInput').focus()">💬 Ask Question</button>
            <button class="quick-btn" onclick="document.getElementById('storeBtn').click()">💾 Store PDF</button>
          </div>
        </div>

      </section>

      <form id="chatForm" class="chat-form">
        <label for="pdfInput" class="attach-btn">📎</label>
        <input id="messageInput" type="text" placeholder="Ask anything..." autocomplete="off" />
        <button type="submit">➜</button>
      </form>

    </main>

  </div>

  <script src="script.js"></script>
</body>
</html>
